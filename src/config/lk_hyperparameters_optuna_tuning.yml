# permissible formats: 'float', 'int', 'log_float', 'categorical' - see optuna_optimize.py for more information
# manual: uncomment lines which are supposed to be tuned
# key: ['value-type', lower bound, upper bound, optional: step size]
# example: 'cnn.dropout': ['float', 0.1, 0.5, 0.1] # fourth value for step size

#'spectrogram.duration': ['float', 8.0, 11, 1]

#'spectrogram.time_mask': ['float', 0.1, 0.4]
#'spectrogram.freq_mask': ['float', 0.1, 0.4]
"spectrogram.max_noise_std": ["float", 0.005, 0.02] # zero means no noise augmentation
#'spectrogram.max_noise_std': ['categorical', [None, 0.01, 0.02, 0.03, 0.05]] #zero means no noise augmentation
#'spectrogram.normalize': ['categorical', ['none', 'minmax', 'standard']] # not implemented
#'features.demographic_data_mode': ['categorical', ['only_bmi', 'all_data', 'no_bmi']]
#'features.add_acoustic_feature': ['categorical', [True, False]]
#'spectrogram.norm': ['categorical', ['minmax_0_1', 'minmax_-1_1']]
"optimizer.weight_decay": ["categorical", [1e-3, 1e-4, 1e-5]]
"scheduler.eta_min": ["categorical", [1e-7, 1e-6, 1e-5]]


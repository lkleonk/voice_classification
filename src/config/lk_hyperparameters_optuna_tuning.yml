"spectrogram.trim_modality": ["categorical", ["start", "middle", "end"]] # 'stretch']] stretch deactivated for now
#'spectrogram.fmin': ['int', 0, 1000, 100]
#'spectrogram.fmax': ['int', 5000, 8000, 500]
#'loss.weighted_loss': ['categorical', [True, False]]


#spectrogram: # access via for example: config['spectrogram']['sample_rate']
spectrogram.sample_rate: 16000 #22050
spectrogram.n_mels: 128 #128 # 132 so as to fit in the ViT
spectrogram.n_fft: 2048 # 2048 and 128 n_mels is also used by hierarchital transformer model https://pmc.ncbi.nlm.nih.gov/articles/PMC11658170/pdf/nihms-1972915.pdf
spectrogram.hop_length: 344
spectrogram.fmin: 50
spectrogram.fmax: 6000
spectrogram.duration: 10 # 11 #10 #16 #5.0 -1 is variable: only suited for lstm
spectrogram.trim_modality: end #"middle" # end # end seems to be the best
#spectrogram.target_shape: wrong - get rid of height - already done in n_mels - also of width bcs that is in hop_lengt + duration + sample_rate[116, 512] # also feasible for vit: [132, 512]#[128, 512] #[192, 320]
spectrogram.freq_mask: 0.3 #0.3 #0.13 #0.3 #0.2 recommended: 0.25
spectrogram.time_mask: 0.2 #0.3 #0.2 #0.15 #0.2      recommended: 0.25
spectrogram.max_noise_std: 0.01 # 0.005–0.02 # std stands for standard deviation, which measures the “strength” or amplitude of the Gaussian noise that is added to the waveform
spectrogram.norm: minmax_0_1 # minmax_-1_1
waveform.norm: minmax_0_1 # normalization for raw-waveform models that skip spectrogram creation
spectrogram.add_chromagram: False
spectrogram.add_mfcc: False
spectrogram.add_delta_mfcc: False
features.norm: minmax_0_1 # demographic/tabular feature scaling; valid: minmax_0_1 | minmax_-1_1
features.add_acoustic_feature: False
loss.weighted_loss: True
features.extra_demographic_data_mlp: True
features.extra_demographic_data_mlp_dropout: 0.1
features.demographic_data_mode: 'all_data' #'only_bmi' # 'all_data' 'no_bmi'  only aplicable to newer dataset
optimizer.weight_decay: 1e-4
scheduler.eta_min: 1e-6
